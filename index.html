
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMKN 3 Kendari</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* WARNA PARIWISATA (BIRU + EMAS) */
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
}

/* CONTAINER */
.container {
    text-align: center;
    width: 90%;
    max-width: 400px;
}

/* LOGO */
.logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #facc15;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(250,204,21,0.5);
}

/* TITLE */
h1 {
    font-size: 1.8rem;
}

p {
    opacity: 0.7;
    margin-bottom: 25px;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;

    /* GLASS + GOLD */
    background: linear-gradient(135deg, #facc15, #eab308);
    color: black;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(250,204,21,0.6);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 0.8rem;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO DARI LINK -->
    <img src="https://lh3.googleusercontent.com/d/1k4CSzwMHage8h4jJSXpZFkyA1TiogD3j=w200" class="logo">

    <h1>SMKN 3 KENDARI</h1>
    <p>Portal Pengumuman Kelulusan Sekolah</p>

    <!-- BUTTON UTAMA -->
    <a class="btn" 
       href="https://script.google.com/a/guru.smk.belajar.id/macros/s/AKfycbwYWqOm3GYimvW1Esd6SIZkKnhHVu2Vuc6uJmeYmByfbcOIbdrMTB8zdSWs5Kqhrh3u/exec" 
       target="_blank">
        📢 Lihat Pengumuman
    </a>

    <div class="footer">
        © 2026 SMKN 3 Kendari
    </div>

</div>

</body>
</html>
